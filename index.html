<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Externship · Ground Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B0E13; --panel:#121722; --panel-2:#19202E; --raise:#1F2838;
    --line:#243042; --line-soft:#1B2230;
    --text:#E6ECF2; --muted:#8A98AB; --faint:#5C6B7E;
    --amber:#FFB454; --cyan:#4FD1E0; --green:#5CD08A; --red:#E0685F;
    --display:'Space Grotesk',system-ui,sans-serif;
    --mono:'IBM Plex Mono',ui-monospace,monospace;
    --body:'Inter',system-ui,sans-serif;
    --r:10px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--ink);color:var(--text);font-family:var(--body);-webkit-font-smoothing:antialiased}
  body{
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(79,209,224,.06), transparent 60%),
      radial-gradient(900px 500px at 0% 0%, rgba(255,180,84,.05), transparent 55%),
      var(--ink);
    min-height:100vh;
  }
  a{color:var(--cyan);text-decoration:none}
  .wrap{max-width:1320px;margin:0 auto;padding:28px 22px 80px}

  /* ---- masthead ---- */
  .mast{display:flex;flex-wrap:wrap;align-items:flex-end;gap:18px 26px;border-bottom:1px solid var(--line);padding-bottom:20px}
  .mast h1{font-family:var(--display);font-weight:700;font-size:clamp(26px,4.4vw,40px);letter-spacing:-.02em;margin:0;line-height:.98}
  .mast h1 .tick{color:var(--amber)}
  .mast .sub{font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:.04em;margin-top:8px}
  .mast .sub .live{color:var(--green)}
  .readout{margin-left:auto;display:flex;gap:22px;align-items:flex-end}
  .stat{font-family:var(--mono);text-align:right}
  .stat b{display:block;font-family:var(--display);font-weight:700;font-size:26px;line-height:1}
  .stat span{font-size:10px;color:var(--faint);letter-spacing:.14em;text-transform:uppercase}
  .stat.live b{color:var(--green)} .stat.out b{color:var(--amber)} .stat.hold b{color:var(--faint)}

  /* ---- mission spotlight ---- */
  .mission{margin-top:22px;border:1px solid var(--line);border-radius:var(--r);background:
      linear-gradient(180deg,rgba(92,208,138,.07),transparent 70%), var(--panel);
    padding:16px 18px;display:flex;align-items:center;gap:16px;position:relative;overflow:hidden}
  .mission::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--green)}
  .mission .led{width:11px;height:11px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px rgba(92,208,138,.18);flex:none}
  .mission .lbl{font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--green);text-transform:uppercase}
  .mission .co{font-family:var(--display);font-weight:600;font-size:18px;margin-top:1px}
  .mission .meta{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:2px}
  .mission .right{margin-left:auto;text-align:right;font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:.08em}
  .mission.none{background:var(--panel)} .mission.none::before{background:var(--faint)} .mission.none .led{background:var(--faint);box-shadow:none}
  .mission.none .lbl{color:var(--faint)}

  /* ---- controls ---- */
  .ctrls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:22px 0 6px}
  .chip{font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--muted);background:var(--panel);border:1px solid var(--line);
    padding:6px 11px;border-radius:999px;cursor:pointer;transition:.15s}
  .chip:hover{border-color:var(--cyan);color:var(--text)}
  .chip[aria-pressed="true"]{background:var(--cyan);color:#04141a;border-color:var(--cyan);font-weight:600}
  .ctrls .spacer{flex:1}
  .btn{font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--text);background:var(--panel-2);border:1px solid var(--line);
    padding:7px 13px;border-radius:8px;cursor:pointer;transition:.15s}
  .btn:hover{border-color:var(--amber);color:var(--amber)}
  .btn.primary{background:var(--amber);color:#1a1205;border-color:var(--amber);font-weight:600}
  .btn.primary:hover{filter:brightness(1.08);color:#1a1205}
  .toggle{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11px;color:var(--muted);cursor:pointer;user-select:none}
  .toggle input{appearance:none;width:30px;height:17px;background:var(--line);border-radius:999px;position:relative;transition:.15s;cursor:pointer}
  .toggle input::after{content:"";position:absolute;top:2px;left:2px;width:13px;height:13px;border-radius:50%;background:var(--muted);transition:.15s}
  .toggle input:checked{background:rgba(79,209,224,.35)} .toggle input:checked::after{left:15px;background:var(--cyan)}

  /* ---- board ---- */
  .board{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:18px}
  .col{background:var(--panel);border:1px solid var(--line-soft);border-radius:var(--r);min-height:160px;display:flex;flex-direction:column}
  .col.drop{border-color:var(--cyan);box-shadow:inset 0 0 0 1px var(--cyan)}
  .col-head{display:flex;align-items:baseline;gap:8px;padding:13px 14px 10px;border-bottom:1px solid var(--line-soft)}
  .col-head .no{font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:.1em}
  .col-head .nm{font-family:var(--display);font-weight:600;font-size:14px;letter-spacing:.01em}
  .col-head .ct{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--panel-2);border-radius:6px;padding:1px 7px}
  .col[data-stage="contacted"] .nm{color:var(--cyan)}
  .col[data-stage="interviewed"] .nm{color:var(--amber)}
  .col[data-stage="resolved"] .nm{color:var(--text)}
  .stack{padding:11px;display:flex;flex-direction:column;gap:10px;flex:1}
  .empty{font-family:var(--mono);font-size:11px;color:var(--faint);text-align:center;padding:22px 6px;border:1px dashed var(--line);border-radius:8px;margin:11px}

  /* ---- card ---- */
  .card{background:var(--panel-2);border:1px solid var(--line);border-radius:9px;padding:11px 12px 10px;position:relative;cursor:grab;transition:border-color .15s,transform .1s}
  .card:hover{border-color:var(--line);transform:translateY(-1px)}
  .card:active{cursor:grabbing}
  .card.active{border-left:3px solid var(--amber)}
  .card.live{border-left:3px solid var(--green)}
  .card.hold{opacity:.5}
  .card .top{display:flex;align-items:center;gap:8px}
  .card .led{width:8px;height:8px;border-radius:50%;flex:none;background:var(--cyan)}
  .card.s-contacted .led{background:var(--cyan)} .card.s-idea .led{background:var(--faint)}
  .card.s-interviewed .led{background:var(--amber)}
  .card.o-success .led{background:var(--green)} .card.o-rejected .led{background:var(--red)} .card.o-cancelled .led{background:var(--faint)}
  .card.active .led, .card.live .led{box-shadow:0 0 0 3px rgba(255,180,84,.18)}
  .card.live .led{box-shadow:0 0 0 3px rgba(92,208,138,.2)}
  .card .co{font-family:var(--display);font-weight:600;font-size:14px;letter-spacing:-.01em}
  .card .role{font-family:var(--body);font-size:12px;color:var(--muted);margin-top:3px;line-height:1.35}
  .card .row{display:flex;flex-wrap:wrap;gap:6px 12px;margin-top:7px;font-family:var(--mono);font-size:10.5px;color:var(--faint)}
  .card .row b{color:var(--muted);font-weight:500}
  .card .tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;align-items:center}
  .cat{font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--cyan);border:1px solid rgba(79,209,224,.3);border-radius:5px;padding:1px 6px}
  .cat.ai{color:var(--amber);border-color:rgba(255,180,84,.35)}
  .hold-tag{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;color:var(--faint);border:1px solid var(--line);border-radius:5px;padding:1px 6px}
  .note{font-size:11.5px;color:var(--muted);margin-top:8px;padding-top:8px;border-top:1px solid var(--line-soft);line-height:1.4;font-style:italic}
  .card .acts{display:flex;gap:6px;margin-top:9px;align-items:center}
  .card select{font-family:var(--mono);font-size:10px;background:var(--panel);color:var(--text);border:1px solid var(--line);border-radius:6px;padding:3px 5px;cursor:pointer}
  .card .iconbtn{margin-left:auto;background:none;border:none;color:var(--faint);cursor:pointer;font-size:13px;padding:2px 4px;border-radius:5px;transition:.15s}
  .card .acts .iconbtn:first-of-type{margin-left:auto}
  .card .iconbtn:hover{color:var(--text);background:var(--panel)}
  .card .iconbtn.del:hover{color:var(--red)}

  /* ---- modal ---- */
  dialog{border:none;background:transparent;padding:0;max-width:none}
  dialog::backdrop{background:rgba(5,8,12,.72);backdrop-filter:blur(2px)}
  .sheet{background:var(--panel);border:1px solid var(--line);border-radius:14px;width:min(94vw,460px);padding:22px;color:var(--text)}
  .sheet h2{font-family:var(--display);font-weight:600;font-size:18px;margin:0 0 4px}
  .sheet p.hint{font-family:var(--mono);font-size:11px;color:var(--faint);margin:0 0 16px}
  .field{margin-bottom:12px}
  .field label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
  .field input,.field select,.field textarea{width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;color:var(--text);
    font-family:var(--body);font-size:13px;padding:9px 10px}
  .field textarea{resize:vertical;min-height:54px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .sheet .foot{display:flex;gap:10px;margin-top:18px;justify-content:flex-end}
  :focus-visible{outline:2px solid var(--cyan);outline-offset:2px}

  footer{margin-top:46px;border-top:1px solid var(--line-soft);padding-top:16px;font-family:var(--mono);font-size:11px;color:var(--faint);display:flex;flex-wrap:wrap;gap:6px 18px}
  footer .ok{color:var(--green)}

  @media(max-width:1000px){.board{grid-template-columns:1fr 1fr}}
  @media(max-width:620px){
    .board{grid-template-columns:1fr}
    .readout{margin-left:0;width:100%;justify-content:space-between;gap:0}
    .mission .right{display:none}
    .grid2{grid-template-columns:1fr}
  }
  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div class="wrap">

  <header class="mast">
    <div>
      <h1>Externship <span class="tick">·</span> Ground Control</h1>
      <div class="sub">Search pipeline — idea to offer · <span id="statusline" class="live">booting…</span></div>
    </div>
    <div class="readout">
      <div class="stat live"><b id="n-live">0</b><span>Live</span></div>
      <div class="stat out"><b id="n-out">0</b><span>In outreach</span></div>
      <div class="stat hold"><b id="n-hold">0</b><span>On hold</span></div>
    </div>
  </header>

  <section id="spotlight" class="mission"></section>

  <div class="ctrls">
    <div id="cats"></div>
    <span class="spacer"></span>
    <label class="toggle"><input type="checkbox" id="showHold" checked> show on-hold</label>
    <button class="btn" id="exportBtn">Export</button>
    <button class="btn" id="importBtn">Import</button>
    <button class="btn primary" id="addBtn">+ Add target</button>
    <input type="file" id="importFile" accept="application/json" hidden>
  </div>

  <main class="board" id="board"></main>

  <footer>
    <span>Externship Ground Control</span>
    <span id="persist" class="ok">● local save on</span>
    <span>Built for Luke Del Core</span>
    <span>Sibling of the FPV Ground Station</span>
  </footer>
</div>

<!-- edit / add modal -->
<dialog id="modal">
  <form method="dialog" class="sheet" id="form">
    <h2 id="formTitle">Add target</h2>
    <p class="hint" id="formHint">Log a company onto the pipeline.</p>
    <div class="field"><label>Company</label><input id="f-company" required></div>
    <div class="grid2">
      <div class="field"><label>Role</label><input id="f-role" placeholder="TBD"></div>
      <div class="field"><label>Location</label><input id="f-location" placeholder="TBD"></div>
    </div>
    <div class="grid2">
      <div class="field"><label>Contact</label><input id="f-contact" placeholder="—"></div>
      <div class="field"><label>Category</label>
        <select id="f-category">
          <option>CPG</option><option>F&B</option><option>AI / Compute</option>
          <option>Int'l strategy</option><option>Hospitality</option><option>Growth</option><option>General</option>
        </select>
      </div>
    </div>
    <div class="grid2">
      <div class="field"><label>Stage</label>
        <select id="f-stage">
          <option value="idea">Idea</option><option value="contacted">Contacted</option>
          <option value="interviewed">Interviewed</option><option value="resolved">Success / Rejected</option>
        </select>
      </div>
      <div class="field"><label>State</label>
        <select id="f-active"><option value="true">Live / active</option><option value="false">On hold</option></select>
      </div>
    </div>
    <div class="field" id="outcomeWrap" hidden><label>Outcome</label>
      <select id="f-outcome"><option value="success">Offer / success</option><option value="rejected">Rejected</option><option value="cancelled">Cancelled / withdrawn</option></select>
    </div>
    <div class="field"><label>Note</label><textarea id="f-note" placeholder="Anything worth remembering…"></textarea></div>
    <div class="foot">
      <button type="button" class="btn" id="cancelBtn">Cancel</button>
      <button type="submit" class="btn primary">Save</button>
    </div>
  </form>
</dialog>

<script>
"use strict";
const KEY="ext-ground-control-v1";
const STAGES=[
  {id:"idea",no:"01",nm:"Idea"},
  {id:"contacted",no:"02",nm:"Contacted"},
  {id:"interviewed",no:"03",nm:"Interviewed"},
  {id:"resolved",no:"04",nm:"Success / Rejected"}
];

/* ---- seed: faithful to the uploaded tracker, current as of latest update ---- */
const SEED=[
  // live mission
  {company:"Wip",role:"Strategy & Category Creation",location:"New York",contact:"Jack Lancaster",category:"CPG",stage:"interviewed",active:true,note:"Caffeine pouches (Zyn meets Red Bull). The only thread still live — in process."},
  // new linkedin outreach (active)
  {company:"SOHO",role:"TBD",location:"TBD",contact:"LinkedIn",category:"AI / Compute",stage:"contacted",active:true,note:"Reached out via LinkedIn."},
  {company:"FluidStack",role:"TBD",location:"TBD",contact:"LinkedIn",category:"AI / Compute",stage:"contacted",active:true,note:"Reached out via LinkedIn. AI / GPU compute."},
  {company:"Crusoe",role:"TBD",location:"TBD",contact:"LinkedIn",category:"AI / Compute",stage:"contacted",active:true,note:"Reached out via LinkedIn. AI / GPU compute."},
  // contacted, on hold
  {company:"Gramms",role:"Strategy & Ops Extern",location:"New York",contact:"Gabriella Walker",category:"CPG",stage:"contacted",active:false,note:"Intro sent. High-protein brand, founder-direct."},
  {company:"Tao Group",role:"Corporate Development Extern",location:"New York",contact:"Taylor Tamburo",category:"Hospitality",stage:"contacted",active:false,note:"Intro sent. Corp dev / M&A modeling seat."},
  {company:"Advantage Solutions",role:"Extern, Growth Initiatives",location:"New York / remote",contact:"James Konigsberg",category:"CPG",stage:"contacted",active:false,note:"Intro sent. CEO-office line of sight."},
  {company:"USTA",role:"Strategy Extern",location:"Remote",contact:"Bobby",category:"Growth",stage:"contacted",active:false,note:"Contacted, paused. NWSL head of strategy reference."},
  {company:"Constellation Brands",role:"TBD",location:"TBD",contact:"Mark Daoust",category:"F&B",stage:"contacted",active:false,note:"Contacted former team members, paused."},
  // idea, on hold
  {company:"Prose",role:"Strategic Finance Extern",location:"New York",contact:"Katharine Nicosia",category:"CPG",stage:"idea",active:false,note:"Series C beauty-tech. $12k/mo. LTV/cohort modeling."},
  {company:"Stealth startup",role:"Strategy Extern",location:"Boston / remote",contact:"David Fall",category:"CPG",stage:"idea",active:false,note:"AI-native CPG, ex-Bain partner, employee #4. Boston in-person."},
  {company:"VF Corp (North Face)",role:"Transformation Manager",location:"Remote",contact:"Charlotte Lidy",category:"CPG",stage:"idea",active:false,note:"GenAI transformation. Hayley Der just rejoined Bain from TNF."},
  {company:"Tuli Lodge",role:"Strategy & Ops Extern",location:"Seattle / remote",contact:"Hannah Goldstein",category:"Hospitality",stage:"idea",active:false,note:"Pre-launch social sauna. Founder-direct."},
  {company:"Gorgie",role:"TBD",location:"New York",contact:"—",category:"CPG",stage:"idea",active:false,note:"Top near-term play."},
  {company:"Recess",role:"TBD",location:"New York",contact:"—",category:"CPG",stage:"idea",active:false,note:"Top near-term play."},
  {company:"Graza",role:"TBD",location:"New York",contact:"Wip team intro",category:"CPG",stage:"idea",active:false,note:"Wip team offered an intro."},
  {company:"Hiyo",role:"TBD",location:"New York",contact:"—",category:"CPG",stage:"idea",active:false,note:""},
  {company:"Fishwife",role:"TBD",location:"Los Angeles",contact:"—",category:"CPG",stage:"idea",active:false,note:""},
  {company:"Blank Street Coffee",role:"TBD",location:"New York",contact:"—",category:"F&B",stage:"idea",active:false,note:""},
  {company:"Dutch Bros",role:"TBD",location:"TBD",contact:"Casey Taylor",category:"F&B",stage:"idea",active:false,note:""},
  {company:"Chipotle",role:"TBD",location:"TBD",contact:"Aaron Cheris",category:"F&B",stage:"idea",active:false,note:""},
  {company:"Chick-fil-A",role:"TBD",location:"TBD",contact:"Andy Noble",category:"F&B",stage:"idea",active:false,note:""},
  {company:"Yum Brands",role:"TBD",location:"TBD",contact:"Seb Pavy",category:"F&B",stage:"idea",active:false,note:""},
  {company:"Starbucks",role:"TBD",location:"TBD",contact:"Seb Pavy",category:"F&B",stage:"idea",active:false,note:""},
  {company:"Pret / 7Brew",role:"TBD",location:"TBD",contact:"Lisa Koetter",category:"F&B",stage:"idea",active:false,note:"Lisa now conflicted."},
  {company:"24 Hour Fitness",role:"TBD",location:"TBD",contact:"Richard Pawlowski",category:"General",stage:"idea",active:false,note:"Via Casey."},
  {company:"USTA Coaching",role:"Strategy & Ops Extern",location:"Remote",contact:"—",category:"Growth",stage:"idea",active:false,note:""},
  {company:"Bain Capital Ventures",role:"Portfolio company extern",location:"Remote",contact:"—",category:"General",stage:"idea",active:false,note:""},
  {company:"Enveritas",role:"Senior Analyst",location:"Remote",contact:"—",category:"General",stage:"idea",active:false,note:""},
  {company:"Gates Foundation",role:"Multiple externships",location:"Remote",contact:"—",category:"General",stage:"idea",active:false,note:""},
  {company:"Mindbody + ClassPass",role:"Program Manager, APAC",location:"Remote",contact:"—",category:"Int'l strategy",stage:"idea",active:false,note:""},
  // resolved — cancelled (Middle East R1)
  {company:"Snap, Inc.",role:"Int'l expansion extern",location:"Dubai",contact:"Yusra",category:"Int'l strategy",stage:"resolved",active:false,outcome:"cancelled",note:"Middle East plan paused given regional uncertainty."},
  {company:"Spotify",role:"Business development extern",location:"Dubai",contact:"Ellis",category:"Int'l strategy",stage:"resolved",active:false,outcome:"cancelled",note:"Middle East plan paused."},
  {company:"Revolut",role:"Strategy & ops manager",location:"Abu Dhabi",contact:"Rami",category:"Int'l strategy",stage:"resolved",active:false,outcome:"cancelled",note:"Middle East plan paused."},
  {company:"Tether",role:"Sr. Associate",location:"Dubai",contact:"—",category:"Int'l strategy",stage:"resolved",active:false,outcome:"cancelled",note:"Middle East plan paused."}
];

/* ---- state ---- */
let persistOk=true;
function uid(){return 'x'+Math.random().toString(36).slice(2,9)}
function withIds(arr){return arr.map(o=>({id:uid(),outcome:null,...o}))}
function load(){
  try{const raw=localStorage.getItem(KEY); if(raw){const d=JSON.parse(raw); if(Array.isArray(d)&&d.length) return d;}}
  catch(e){persistOk=false}
  return withIds(SEED);
}
function save(){
  try{localStorage.setItem(KEY,JSON.stringify(state))}
  catch(e){persistOk=false; const p=document.getElementById('persist'); if(p){p.textContent='● local save off (browser blocked storage)';p.classList.remove('ok')}}
}
let state=load();
let catFilter="ALL";
const ALL_CATS=["CPG","F&B","AI / Compute","Int'l strategy","Hospitality","Growth","General"];

/* ---- render ---- */
const board=document.getElementById('board');
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function visible(){
  const showHold=document.getElementById('showHold').checked;
  return state.filter(i=>{
    if(!showHold && !i.active) return false;
    if(catFilter!=="ALL" && i.category!==catFilter) return false;
    return true;
  });
}

function cardHTML(i){
  const cls=['card','s-'+i.stage];
  if(i.stage==='resolved'&&i.outcome) cls.push('o-'+i.outcome);
  if(i.active) cls.push(i.stage==='interviewed'?'live':'active');
  if(!i.active) cls.push('hold');
  const isAI=i.category==='AI / Compute';
  const outcomeSel = i.stage==='resolved' ? `
    <select data-act="outcome" data-id="${i.id}" title="Outcome">
      <option value="success" ${i.outcome==='success'?'selected':''}>Offer</option>
      <option value="rejected" ${i.outcome==='rejected'?'selected':''}>Rejected</option>
      <option value="cancelled" ${i.outcome==='cancelled'?'selected':''}>Cancelled</option>
    </select>`:'';
  return `<article class="${cls.join(' ')}" draggable="true" data-id="${i.id}">
    <div class="top"><span class="led"></span><span class="co">${esc(i.company)}</span></div>
    ${i.role?`<div class="role">${esc(i.role)}</div>`:''}
    <div class="row">
      ${i.location&&i.location!=='TBD'?`<span><b>loc</b> ${esc(i.location)}</span>`:''}
      ${i.contact&&i.contact!=='—'?`<span><b>via</b> ${esc(i.contact)}</span>`:''}
    </div>
    <div class="tags">
      <span class="cat ${isAI?'ai':''}">${esc(i.category)}</span>
      ${!i.active?'<span class="hold-tag">ON HOLD</span>':''}
    </div>
    ${i.note?`<div class="note">${esc(i.note)}</div>`:''}
    <div class="acts">
      <select data-act="stage" data-id="${i.id}" title="Move stage">
        ${STAGES.map(s=>`<option value="${s.id}" ${i.stage===s.id?'selected':''}>${s.nm}</option>`).join('')}
      </select>
      ${outcomeSel}
      <button class="iconbtn" data-act="edit" data-id="${i.id}" title="Edit">✎</button>
      <button class="iconbtn del" data-act="del" data-id="${i.id}" title="Delete">✕</button>
    </div>
  </article>`;
}

function render(){
  const items=visible();
  board.innerHTML=STAGES.map(s=>{
    const list=items.filter(i=>i.stage===s.id);
    const inner = list.length ? list.map(cardHTML).join('')
      : `<div class="empty">nothing here yet</div>`;
    return `<section class="col" data-stage="${s.id}">
      <div class="col-head"><span class="no">${s.no}</span><span class="nm">${s.nm}</span><span class="ct">${list.length}</span></div>
      <div class="stack">${inner}</div>
    </section>`;
  }).join('');
  // stats over full state (not just filtered)
  const live=state.filter(i=>i.active&&i.stage==='interviewed').length;
  const out=state.filter(i=>i.active&&i.stage==='contacted').length;
  const hold=state.filter(i=>!i.active&&i.stage!=='resolved').length;
  document.getElementById('n-live').textContent=live;
  document.getElementById('n-out').textContent=out;
  document.getElementById('n-hold').textContent=hold;
  document.getElementById('statusline').innerHTML=`<span class="live">${live} live</span> · ${out} in outreach · ${hold} on hold`;
  renderSpotlight();
  bindCards();
}

function renderSpotlight(){
  const order={interviewed:3,contacted:2,idea:1,resolved:0};
  const live=state.filter(i=>i.active).sort((a,b)=>order[b.stage]-order[a.stage]);
  const el=document.getElementById('spotlight');
  if(!live.length){
    el.className='mission none';
    el.innerHTML=`<span class="led"></span><div><div class="lbl">No live mission</div><div class="co">Pipeline on standby</div><div class="meta">Everything on hold — add a target or take one off hold.</div></div>`;
    return;
  }
  const m=live[0];
  el.className='mission';
  el.innerHTML=`<span class="led"></span>
    <div>
      <div class="lbl">Live mission · stage ${STAGES.find(s=>s.id===m.stage).no}</div>
      <div class="co">${esc(m.company)}</div>
      <div class="meta">${esc(m.role||'TBD')} · ${esc(m.location||'TBD')}${m.contact&&m.contact!=='—'?' · via '+esc(m.contact):''}</div>
    </div>
    <div class="right">${live.length>1?(live.length-1)+' more active':'sole active thread'}</div>`;
}

/* ---- categories filter bar ---- */
function renderCats(){
  const present=ALL_CATS.filter(c=>state.some(i=>i.category===c));
  const host=document.getElementById('cats');
  host.innerHTML=[`<button class="chip" data-cat="ALL" aria-pressed="${catFilter==='ALL'}">All</button>`]
    .concat(present.map(c=>`<button class="chip" data-cat="${c}" aria-pressed="${catFilter===c}">${esc(c)}</button>`)).join(' ');
  host.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{catFilter=b.dataset.cat;renderCats();render();});
}

/* ---- card interactions ---- */
function findItem(id){return state.find(i=>i.id===id)}
function bindCards(){
  board.querySelectorAll('[data-act]').forEach(el=>{
    const id=el.dataset.id, act=el.dataset.act;
    if(el.tagName==='SELECT'){
      el.onchange=()=>{const it=findItem(id); if(!it)return;
        if(act==='stage'){it.stage=el.value; if(it.stage==='resolved'&&!it.outcome)it.outcome='success'; if(it.stage!=='resolved')it.outcome=null;}
        if(act==='outcome'){it.outcome=el.value;}
        save();render();};
    }else{
      el.onclick=()=>{ if(act==='edit')openForm(id); if(act==='del')delItem(id); };
    }
  });
  // drag & drop (desktop)
  board.querySelectorAll('.card').forEach(c=>{
    c.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',c.dataset.id);e.dataTransfer.effectAllowed='move';});
  });
  board.querySelectorAll('.col').forEach(col=>{
    col.addEventListener('dragover',e=>{e.preventDefault();col.classList.add('drop');});
    col.addEventListener('dragleave',()=>col.classList.remove('drop'));
    col.addEventListener('drop',e=>{e.preventDefault();col.classList.remove('drop');
      const id=e.dataTransfer.getData('text/plain'); const it=findItem(id); if(!it)return;
      it.stage=col.dataset.stage;
      if(it.stage==='resolved'&&!it.outcome)it.outcome='success';
      if(it.stage!=='resolved')it.outcome=null;
      save();render();});
  });
}
function delItem(id){const it=findItem(id); if(!it)return;
  if(confirm(`Remove ${it.company} from the tracker?`)){state=state.filter(i=>i.id!==id);save();renderCats();render();}}

/* ---- modal form ---- */
const modal=document.getElementById('modal'), form=document.getElementById('form');
let editingId=null;
function syncOutcome(){document.getElementById('outcomeWrap').hidden = document.getElementById('f-stage').value!=='resolved';}
document.getElementById('f-stage').addEventListener('change',syncOutcome);
function openForm(id){
  editingId=id||null;
  const it=id?findItem(id):null;
  document.getElementById('formTitle').textContent=id?'Edit target':'Add target';
  document.getElementById('formHint').textContent=id?'Update the details for this company.':'Log a company onto the pipeline.';
  document.getElementById('f-company').value=it?it.company:'';
  document.getElementById('f-role').value=it?it.role:'';
  document.getElementById('f-location').value=it?it.location:'';
  document.getElementById('f-contact').value=it?it.contact:'';
  document.getElementById('f-category').value=it?it.category:'CPG';
  document.getElementById('f-stage').value=it?it.stage:'idea';
  document.getElementById('f-active').value=it?String(!!it.active):'true';
  document.getElementById('f-outcome').value=it&&it.outcome?it.outcome:'success';
  document.getElementById('f-note').value=it?it.note:'';
  syncOutcome();
  modal.showModal();
  document.getElementById('f-company').focus();
}
form.addEventListener('submit',e=>{
  const data={
    company:document.getElementById('f-company').value.trim()||'Untitled',
    role:document.getElementById('f-role').value.trim(),
    location:document.getElementById('f-location').value.trim(),
    contact:document.getElementById('f-contact').value.trim()||'—',
    category:document.getElementById('f-category').value,
    stage:document.getElementById('f-stage').value,
    active:document.getElementById('f-active').value==='true',
    note:document.getElementById('f-note').value.trim(),
    outcome:document.getElementById('f-stage').value==='resolved'?document.getElementById('f-outcome').value:null
  };
  if(editingId){Object.assign(findItem(editingId),data);}
  else{state.unshift({id:uid(),...data});}
  save();renderCats();render();
});
document.getElementById('cancelBtn').onclick=()=>modal.close();
document.getElementById('addBtn').onclick=()=>openForm(null);

/* ---- toggle + import/export ---- */
document.getElementById('showHold').addEventListener('change',render);
document.getElementById('exportBtn').onclick=()=>{
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='externship-tracker.json';a.click();URL.revokeObjectURL(a.href);
};
document.getElementById('importBtn').onclick=()=>document.getElementById('importFile').click();
document.getElementById('importFile').addEventListener('change',e=>{
  const file=e.target.files[0]; if(!file)return;
  const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);
    if(Array.isArray(d)){state=d.map(o=>({id:o.id||uid(),outcome:null,...o}));save();renderCats();render();}
    else alert('That file doesn’t look like a tracker export.');
  }catch(err){alert('Could not read that file — is it the JSON export?');}};
  r.readAsText(file); e.target.value='';
});

if(!persistOk){const p=document.getElementById('persist');p.textContent='● local save off';p.classList.remove('ok');}
renderCats();
render();
</script>
</body>
</html>
